<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СУПЕР ДІВЧАТКА GO!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-color: #f0f4f8; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header h1 {
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header p {
            color: #546e7a;
            margin: 0;
            font-weight: 400;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            width: 100%;
            max-width: 1400px; 
            align-items: start;
        }

        .crossword-wrapper {
            display: flex;
            justify-content: flex-end; 
            overflow-x: auto; 
            padding-right: 10px;
        }

        .crossword-board {
            border-collapse: collapse;
            background-color: transparent;
        }

        .crossword-board td {
            width: 38px;
            height: 38px;
            text-align: center;
            vertical-align: middle;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 0;
        }

        .cell {
            border: 2px solid #2c3e50;
            background-color: #ffffff; 
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1); 
        }

        .cell:hover {
            background-color: #e3f2fd;
            transform: scale(1.05);
            z-index: 10;
        }

        .cell.revealed {
            background-color: #e8f5e9; 
        }

        .letter {
            opacity: 0; 
            color: #1b5e20;
            transition: opacity 0.4s ease; 
        }

        .cell.revealed .letter {
            opacity: 1; 
        }

        .number {
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 11px;
            color: #555;
            font-weight: 600;
            line-height: 1;
        }

        .empty {
            border: none;
            background-color: transparent;
        }

        .clues-container {
            background-color: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(5px); 
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .clues-container h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.3rem;
            border-bottom: 2px solid #e3f2fd;
            padding-bottom: 8px;
            font-weight: 700;
        }

        .clues-list {
            list-style-type: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .clue-item {
            margin-bottom: 12px;
            color: #455a64;
            line-height: 1.4;
            transition: color 0.3s ease;
            font-size: 15px;
            font-weight: 400;
        }

        .clue-item.solved {
            color: #1b5e20;
            font-weight: 600;
            text-decoration: line-through;
            opacity: 0.7;
        }

        .clue-number {
            font-weight: 700;
            margin-right: 5px;
            color: #2c3e50;
        }

        /* СТИЛІ ДЛЯ ВІКНА ПРИВІТАННЯ З КАПІБАРОЮ */
        #congrats-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #congrats-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            max-width: 400px;
            transform: translateY(20px);
            transition: transform 0.5s ease;
        }

        #congrats-modal.show .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            color: #1b5e20;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .modal-content img {
            max-width: 150px;
            height: auto;
            margin-bottom: 25px;
        }

        .modal-content button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: background-color 0.2s;
            width: 100%;
        }

        .modal-content button:hover {
            background-color: #1a252f;
        }

        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .crossword-wrapper {
                justify-content: center;
                padding-right: 0;
            }
            .clues-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>СУПЕР ДІВЧАТКА GO!</h1>
        <p>Натисніть на будь-яку клітинку, щоб розкрити слово!</p>
    </div>

    <div class="main-container">
        <div class="crossword-wrapper">
            <table class="crossword-board" id="crossword"></table>
        </div>

        <div class="clues-container">
            <h2>По горизонталі</h2>
            <ul class="clues-list" id="clues-across"></ul>

            <h2>По вертикалі</h2>
            <ul class="clues-list" id="clues-down"></ul>
        </div>
    </div>

    <div id="congrats-modal">
        <div class="modal-content">
            <h2>Так тримати!</h2>
            <img src="capy.png" alt="Happy Capybara">
            <button onclick="closeModal()">Супер!</button>
        </div>
    </div>

    <script>
        const words = [
            { id: 1, number: 1, text: "ФІОЛЕТОВИЙ", row: 2, col: 6, dir: "V", clue: "Який улюблений колір Софії?" },
            { id: 2, number: 2, text: "БРИТАНІЯ", row: 2, col: 10, dir: "V", clue: "Яку країну мріє відвідати Вероніка?" },
            { id: 3, number: 3, text: "ТАНЦІ", row: 3, col: 12, dir: "V", clue: "Чим займається Дарина?" },
            { id: 4, number: 4, text: "ВІДЕОІГРИ", row: 4, col: 2, dir: "H", clue: "Яке основне хобі Софії?" },
            { id: 5, number: 5, text: "США", row: 4, col: 17, dir: "V", clue: "Якою країною захоплюється Дар'я?" },
            { id: 6, number: 6, text: "ФРАНЦУЗЬКА", row: 6, col: 8, dir: "H", clue: "Яку мову зараз вивчає Дар'я?" },
            { id: 7, number: 7, text: "КУЛІНАРІЯ", row: 6, col: 16, dir: "V", clue: "Яке хобі у Вероніки?" },
            { id: 8, number: 8, text: "ЯПОНІЯ", row: 9, col: 12, dir: "H", clue: "Історією якої країни цікавиться Дарина? (окрім України)" },
            { id: 9, number: 9, text: "ПЯТЬ", row: 9, col: 13, dir: "V", clue: "Скільки всього мов вивчала Дарина?" },
            { id: 10, number: 10, text: "ТРИ", row: 10, col: 4, dir: "H", clue: "Скільки домашніх тварин має Софія?" },
            { id: 11, number: 11, text: "ШОСТИЙ", row: 10, col: 11, dir: "V", clue: "З якого класу Вероніка мріяла навчатися на мовній спеціальності?" },
            { id: 12, number: 12, text: "СПОРТ", row: 11, col: 9, dir: "H", clue: "Чим захоплюється Дар'я?" }
        ];

        const numRows = 17; 
        const numCols = 20;

        let grid = Array(numRows).fill(null).map(() => Array(numCols).fill(null));
        
        // Змінна для відстеження кількості розгаданих слів
        let solvedWords = new Set();
        const totalWords = words.length;

        const cluesAcross = document.getElementById('clues-across');
        const cluesDown = document.getElementById('clues-down');

        words.forEach(word => {
            let r = word.row;
            let c = word.col;
            
            for (let i = 0; i < word.text.length; i++) {
                let char = word.text[i];
                
                if (!grid[r][c]) {
                    grid[r][c] = {
                        char: char,
                        wordIds: [],
                        number: i === 0 ? word.number : null 
                    };
                } else if (i === 0 && !grid[r][c].number) {
                    grid[r][c].number = word.number;
                }
                
                grid[r][c].wordIds.push(word.id);
                
                if (word.dir === 'H') c++;
                else r++;
            }

            let li = document.createElement('li');
            li.className = 'clue-item';
            li.id = 'clue-' + word.id; 
            li.innerHTML = `<span class="clue-number">${word.number}.</span> ${word.clue}`;

            if (word.dir === 'H') {
                cluesAcross.appendChild(li);
            } else {
                cluesDown.appendChild(li);
            }
        });

        const table = document.getElementById('crossword');
        for (let r = 0; r < numRows; r++) {
            let tr = document.createElement('tr');
            for (let c = 0; c < numCols; c++) {
                let td = document.createElement('td');
                let cellData = grid[r][c];
                
                if (cellData) {
                    td.className = 'cell';
                    td.dataset.wordIds = cellData.wordIds.join(',');
                    
                    let span = document.createElement('span');
                    span.className = 'letter';
                    span.innerText = cellData.char;
                    td.appendChild(span);
                    
                    if (cellData.number) {
                        let numSpan = document.createElement('span');
                        numSpan.className = 'number';
                        numSpan.innerText = cellData.number;
                        td.appendChild(numSpan);
                    }
                    
                    td.addEventListener('click', function() {
                        let ids = this.dataset.wordIds.split(',');
                        
                        ids.forEach(id => {
                            // Якщо слово ще не розгадане, додаємо його до списку розгаданих
                            if (!solvedWords.has(id)) {
                                solvedWords.add(id);
                                
                                document.querySelectorAll('.cell').forEach(cell => {
                                    let cellIds = cell.dataset.wordIds.split(',');
                                    if (cellIds.includes(id)) {
                                        cell.classList.add('revealed');
                                    }
                                });

                                let clueElement = document.getElementById('clue-' + id);
                                if (clueElement) {
                                    clueElement.classList.add('solved');
                                }
                                
                                // Перевіряємо, чи всі слова розгадано
                                if (solvedWords.size === totalWords) {
                                    setTimeout(() => {
                                        document.getElementById('congrats-modal').classList.add('show');
                                    }, 600); // Затримка 0.6 секунди, щоб користувач встиг побачити останнє слово
                                }
                            }
                        });
                    });
                    
                } else {
                    td.className = 'empty';
                }
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }

        // Функція для закриття вікна привітання
        function closeModal() {
            document.getElementById('congrats-modal').classList.remove('show');
        }
    </script>
</body>
</html>
